name: Mac Release Build

on:
  workflow_dispatch:
    inputs:
      build_archs:
        description: "Target architectures"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - arm64
          - x86_64
      skip_tests:
        description: "Skip JS unit tests (faster build)"
        required: false
        default: true
        type: boolean

jobs:
  build-mac-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Select Xcode 26.1
        run: |
          sudo xcode-select -s /Applications/Xcode_26.1.app 2>/dev/null \
            || sudo xcode-select -s /Applications/Xcode_16.3.app 2>/dev/null \
            || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version
          swift --version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          check-latest: true

      - name: Setup pnpm
        uses: ./.github/actions/setup-pnpm-store-cache
        with:
          pnpm-version: "10.23.0"
          cache-key-suffix: "node22-mac"

      - name: Install dependencies
        run: |
          export PATH="$(dirname "$(node -p "process.execPath")"):$PATH"
          pnpm install --no-frozen-lockfile --ignore-scripts=false \
            --config.engine-strict=false \
            --config.enable-pre-post-scripts=true \
            --config.node-linker=hoisted \
          || pnpm install --no-frozen-lockfile --ignore-scripts=false \
            --config.engine-strict=false \
            --config.enable-pre-post-scripts=true \
            --config.node-linker=hoisted

      - name: Stub a2ui bundle (vendor sources not in git)
        run: |
          mkdir -p src/canvas-host/a2ui
          touch src/canvas-host/a2ui/a2ui.bundle.js

      - name: Run JS tests
        if: ${{ !inputs.skip_tests }}
        run: pnpm test:fast
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build JS dist
        run: pnpm build
        env:
          OPENCLAW_A2UI_SKIP_MISSING: "1"

      - name: Build Control UI
        run: node scripts/ui.js build

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-swiftpm-${{ hashFiles('apps/macos/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swiftpm-

      - name: Build macOS app bundle
        env:
          BUILD_CONFIG: release
          BUILD_ARCHS: ${{ inputs.build_archs || 'all' }}
          BUNDLE_ID: ai.openclaw.mac
          ALLOW_ADHOC_SIGNING: "1"
          SKIP_TSC: "1"
          SKIP_UI_BUILD: "1"
        run: |
          chmod +x scripts/codesign-mac-app.sh scripts/package-mac-app.sh scripts/create-dmg.sh
          bash scripts/package-mac-app.sh

      - name: Bundle Node.js runtime into app
        run: |
          set -euo pipefail
          NODE_VER="v22.12.0"
          RESOURCES="dist/OpenClaw.app/Contents/Resources"
          NODE_DEST="$RESOURCES/tools/node/bin"
          mkdir -p "$NODE_DEST"

          echo "Downloading Node.js $NODE_VER..."
          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-arm64.tar.gz" -o /tmp/node-arm64.tar.gz
          curl -fsSL "https://nodejs.org/dist/$NODE_VER/node-$NODE_VER-darwin-x64.tar.gz"  -o /tmp/node-x64.tar.gz

          tar -xzf /tmp/node-arm64.tar.gz -C /tmp
          tar -xzf /tmp/node-x64.tar.gz  -C /tmp

          echo "Creating universal Node.js binary..."
          /usr/bin/lipo -create \
            "/tmp/node-$NODE_VER-darwin-arm64/bin/node" \
            "/tmp/node-$NODE_VER-darwin-x64/bin/node" \
            -output "$NODE_DEST/node"
          chmod +x "$NODE_DEST/node"

          echo "Node.js bundled: $("$NODE_DEST/node" --version)"

      - name: Bundle openclaw gateway into app
        run: |
          set -euo pipefail
          WORKSPACE="$(pwd)"
          RESOURCES="dist/OpenClaw.app/Contents/Resources"
          GATEWAY="$RESOURCES/openclaw-gateway"
          mkdir -p "$GATEWAY/dist"

          # Copy JS bundle files (tsdown with platform:"node" externalizes all node_modules,
          # so we must also bundle the full production node_modules tree below).
          echo "Copying tsdown JS bundle..."
          cp dist/index.js "$GATEWAY/dist/index.js"
          for extra in entry.js daemon-cli.js extensionAPI.js warning-filter.js; do
            [ -f "dist/$extra" ] && cp "dist/$extra" "$GATEWAY/dist/$extra" || true
          done
          [ -d dist/hooks ]      && cp -R dist/hooks      "$GATEWAY/dist/hooks"      || true
          [ -d dist/plugin-sdk ] && cp -R dist/plugin-sdk "$GATEWAY/dist/plugin-sdk" || true
          cp package.json "$GATEWAY/"

          echo "Gateway dist contents:"
          ls -lh "$GATEWAY/dist/"

          # Reuse the workspace node_modules (already fully installed with all scripts,
          # so native prebuilt binaries are correctly downloaded/compiled for arm64).
          # We snapshot arm64 .node binaries first, then use pnpm to create a fresh
          # production-only install in a temp dir (scripts enabled so native packages
          # download their prebuilts), then lipo for universal binaries.
          echo "Snapshotting arm64 native binaries from workspace install..."
          ARM64_SNAP="$(mktemp -d)"
          find node_modules -maxdepth 6 -name "*.node" 2>/dev/null | \
          while IFS= read -r f; do
            rel="${f#node_modules/}"
            dest="$ARM64_SNAP/$rel"
            mkdir -p "$(dirname "$dest")"
            cp "$f" "$dest"
          done

          # Install production-only deps into a temp dir.
          # Scripts are enabled so packages like sharp/sqlite-vec download their prebuilts.
          # pnpm store is already warm from the earlier install step — this is fast.
          echo "Installing production node_modules (pnpm --prod, scripts enabled)..."
          PROD_DIR="$(mktemp -d)"
          cp "$WORKSPACE/package.json" "$PROD_DIR/"
          cp "$WORKSPACE/pnpm-lock.yaml" "$PROD_DIR/" 2>/dev/null || true

          (cd "$PROD_DIR" && \
            pnpm install \
              --prod \
              --no-frozen-lockfile \
              --config.engine-strict=false \
              --config.node-linker=hoisted \
              2>&1 | tail -10) || \
          echo "WARNING: prod install had issues"

          if [ ! -d "$PROD_DIR/node_modules" ]; then
            echo "ERROR: prod node_modules was not created"
            exit 1
          fi
          echo "Prod node_modules size: $(du -sh "$PROD_DIR/node_modules" | cut -f1)"

          # For .node files that the prod install downloaded (arm64), replace with the
          # arm64 snapshot to ensure we have the correct pre-built binaries, then rebuild
          # for x64 and lipo into fat binaries.
          echo "Rebuilding native addons for x64 (Intel Mac support)..."
          (cd "$PROD_DIR" && npm_config_arch=x64 pnpm rebuild 2>/dev/null) || \
          (cd "$PROD_DIR" && npm_config_arch=x64 npm rebuild 2>/dev/null) || \
          echo "x64 rebuild skipped"

          # Copy prod node_modules into the gateway bundle.
          cp -R "$PROD_DIR/node_modules" "$GATEWAY/"
          rm -rf "$PROD_DIR"

          # Lipo arm64 + x64 .node files into universal fat binaries.
          echo "Creating universal (fat) .node binaries..."
          find "$GATEWAY/node_modules" -name "*.node" 2>/dev/null | while IFS= read -r x64node; do
            rel="${x64node#$GATEWAY/node_modules/}"
            arm64node="$ARM64_SNAP/$rel"
            if [ -f "$arm64node" ]; then
              arm64_archs=$(/usr/bin/lipo -archs "$arm64node" 2>/dev/null || echo "")
              x64_archs=$(/usr/bin/lipo -archs "$x64node" 2>/dev/null || echo "")
              if echo "$arm64_archs" | grep -q "arm64" && echo "$x64_archs" | grep -q "x86_64"; then
                /usr/bin/lipo -create "$arm64node" "$x64node" -output "$x64node" 2>/dev/null && \
                  echo "  fat: $rel" || echo "  lipo failed: $rel (keeping as-is)"
              elif echo "$arm64_archs" | grep -q "arm64"; then
                cp "$arm64node" "$x64node"
                echo "  arm64-only: $rel"
              fi
            fi
          done
          rm -rf "$ARM64_SNAP"

          # Free up workspace node_modules now — they have been copied into the gateway
          # bundle and are no longer needed. Removing them early saves ~1-2 GB before
          # the hdiutil convert step, which needs room for both the RW and final DMG.
          echo "Removing workspace node_modules to free disk space..."
          rm -rf "$WORKSPACE/node_modules"

          echo "Gateway size: $(du -sh "$GATEWAY" | cut -f1)"
          echo "App size:     $(du -sh dist/OpenClaw.app | cut -f1)"
          echo "Disk free:    $(df -h . | tail -1 | awk '{print $4}')"

      - name: Verify bundle contents
        run: |
          set -euo pipefail
          RESOURCES="dist/OpenClaw.app/Contents/Resources"
          GATEWAY="$RESOURCES/openclaw-gateway"

          echo "=== Verifying bundled gateway ==="
          NODE_BIN="$RESOURCES/tools/node/bin/node"
          GATEWAY_ENTRY="$GATEWAY/dist/index.js"

          # Node binary must be executable
          if [ ! -x "$NODE_BIN" ]; then
            echo "ERROR: Bundled node binary missing or not executable: $NODE_BIN"
            exit 1
          fi
          echo "Node binary: $NODE_BIN"
          "$NODE_BIN" --version

          # Gateway entry must exist
          if [ ! -f "$GATEWAY_ENTRY" ]; then
            echo "ERROR: Gateway entry point missing: $GATEWAY_ENTRY"
            exit 1
          fi
          echo "Gateway entry: $GATEWAY_ENTRY ($(wc -c < "$GATEWAY_ENTRY") bytes)"

          # Quick smoke test: run --version with the bundled node
          VERSION_OUT="$("$NODE_BIN" "$GATEWAY_ENTRY" --version 2>&1 || true)"
          echo "Gateway --version output: $VERSION_OUT"

          echo "=== Native modules in bundle ==="
          find "$GATEWAY/node_modules" -name "*.node" 2>/dev/null | while read f; do
            echo "  $f: $(/usr/bin/lipo -archs "$f" 2>/dev/null || echo 'not a fat binary')"
          done || echo "(none found)"

      - name: Re-sign app after adding resources
        run: |
          /usr/bin/codesign --force --deep --sign - dist/OpenClaw.app

      - name: Free disk space before DMG creation
        run: |
          set -euo pipefail
          echo "=== Disk usage before cleanup ==="
          df -h .
          # DerivedData is no longer needed after the Swift build.
          rm -rf ~/Library/Developer/Xcode/DerivedData 2>/dev/null || true
          # Downloaded Node.js tarballs used for the bundled runtime.
          rm -f /tmp/node-*.tar.gz 2>/dev/null || true
          # Prune the pnpm content-addressable store of unreferenced blobs.
          pnpm store prune --force 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h .

      - name: Create DMG
        env:
          SKIP_NOTARIZE: "1"
        run: |
          APP="dist/OpenClaw.app"
          VERSION=$(node -p "require('./package.json').version")
          DMG="dist/OpenClaw-${VERSION}.dmg"
          bash scripts/create-dmg.sh "$APP" "$DMG"
          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create ZIP (for Sparkle / direct download)
        run: |
          VERSION="${APP_VERSION}"
          ZIP="dist/OpenClaw-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "dist/OpenClaw.app" "$ZIP"
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"

      - name: Show build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -lh dist/OpenClaw* || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-${{ env.APP_VERSION }}-mac
          path: |
            ${{ env.DMG_PATH }}
            ${{ env.ZIP_PATH }}
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## Mac Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** \`${APP_VERSION}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Architectures:** \`${{ inputs.build_archs || 'all' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the artifacts from the **Actions** tab above:" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`OpenClaw-${APP_VERSION}.dmg\` — drag-and-drop installer" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`OpenClaw-${APP_VERSION}.zip\` — zip archive" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Note:** This is an ad-hoc signed build (no Apple Developer certificate)." >> "$GITHUB_STEP_SUMMARY"
          echo "> On the target Mac, right-click the app and choose **Open** to bypass Gatekeeper." >> "$GITHUB_STEP_SUMMARY"
